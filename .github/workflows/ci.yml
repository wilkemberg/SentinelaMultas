name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      working-directory: ./backend/Sentinela.Api
      run: dotnet restore
      
    - name: Build
      working-directory: ./backend/Sentinela.Api
      run: dotnet build --no-restore -c Release
      
    - name: Test
      working-directory: ./backend/Sentinela.Api
      run: dotnet test --no-build --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/sentinela-web/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./frontend/sentinela-web
      run: npm ci
      
    - name: Build
      working-directory: ./frontend/sentinela-web
      run: npm run build
